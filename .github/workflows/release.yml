name: Release

# Tag-driven release. Push a tag matching `v*` to start the workflow, or
# trigger it manually via `workflow_dispatch` against an existing tag.
#
# Defensive design rationale (see /Users/clement/.claude/plans/ for the
# full post-mortem of the v0.1.5 duplicate-release incident):
#   - `concurrency` prevents two runs racing on the same tag.
#   - `create-release` is idempotent: it reuses an existing draft if one
#     already exists for the tag, instead of letting softprops/action-gh-release
#     create a duplicate.
#   - All upload steps reference the SAME tag/release that create-release
#     resolved, via `releaseId` (tauri-action) or the `gh` CLI by tag.
#   - The previous "Create and push tag" step is GONE: the tag is created
#     locally and pushed by the maintainer, never by the workflow itself.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Existing tag to (re)release, e.g. v0.1.6'
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      # Idempotent draft creation. softprops/action-gh-release@v1 finds the
      # existing release for the tag (draft or published) if one already
      # exists, so re-runs converge on the same Release object instead of
      # producing duplicates. The previous v0.1.5 duplicate-release incident
      # came from a race between two concurrent runs; the workflow-level
      # `concurrency:` group above now serialises runs on the same tag, which
      # is the durable fix for that class of bug.
      - name: Create / update draft Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: S2Tui ${{ steps.get_version.outputs.version }}
          draft: true
          prerelease: false
          body: |
            ## What's New

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            ## Downloads

            | Platform | Installer | Portable |
            |----------|-----------|----------|
            | **macOS (Apple Silicon)** | `.dmg` | - |
            | **macOS (Intel)** | `.dmg` | - |
            | **Windows** | `.exe` (NSIS), `.msi` | `.zip` (portable) |
            | **Linux** | `.deb`, `.rpm` | `.tar.gz` (portable) |

            ## Installation Notes

            ### macOS
            - Download the `.dmg` for your architecture, drag S2Tui to Applications.
            - First launch: Right-click → Open (to bypass Gatekeeper).

            ### Windows
            - **NSIS Installer**: download `*-setup.exe` and run.
            - **MSI Installer**: download `*.msi` (preferred for enterprise).
            - **Portable**: download `*_portable.zip`, extract, run.

            ### Linux
            - **Debian/Ubuntu**: `sudo dpkg -i s2tui_*.deb`
            - **Fedora/RHEL/CentOS**: `sudo rpm -ivh s2tui-*.rpm`
            - **Portable**: extract the `.tar.gz` and run.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build (${{ matrix.platform.name }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
          - name: macOS-x64
            os: macos-15-intel
            target: x86_64-apple-darwin
            bundles: dmg
          - name: Windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: 'nsis,msi'
          - name: Linux
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb

    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Whisper models are no longer bundled — the app downloads them
      # from the `models-v1` GitHub Release on first launch (issue #2,
      # step 1). The earlier `curl` of the q5_x quantised builds from
      # Hugging Face is intentionally removed: it shaves ~728 MB off
      # every artifact and a few minutes off every build.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.platform.target }}

      # ----- Per-platform system dependencies -----

      - name: Install Linux dependencies
        if: matrix.platform.name == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxcb-shm0 \
            libvulkan-dev \
            rpm \
            wget
          # Vulkan SDK for the Linux build (matches v0.1.5's build-linux job).
          VULKAN_VERSION=1.3.296.0
          wget -q "https://sdk.lunarg.com/sdk/download/${VULKAN_VERSION}/linux/vulkansdk-linux-x86_64-${VULKAN_VERSION}.tar.xz"
          tar -xf "vulkansdk-linux-x86_64-${VULKAN_VERSION}.tar.xz"
          echo "VULKAN_SDK=$PWD/${VULKAN_VERSION}/x86_64" >> $GITHUB_ENV
          echo "$PWD/${VULKAN_VERSION}/x86_64/bin" >> $GITHUB_PATH

      - name: Install Windows build tools
        if: matrix.platform.name == 'Windows'
        shell: pwsh
        run: |
          choco install ninja -y --no-progress

          # whisper-cpp's CMake step on Windows needs an explicit generator.
          # Exporting via $GITHUB_ENV (instead of a job-level `env:` ternary)
          # is the only way to *not set* the variable at all on macOS/Linux —
          # otherwise CMake receives `-G ""` and bails with
          # "Could not create named generator". This is the regression that
          # broke every non-Windows job in run 25447531916.
          "CMAKE_GENERATOR=Ninja" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8

          # Vulkan SDK for whisper-cpp's optional Vulkan backend.
          $vulkanVersion = "1.4.304.0"
          $vulkanUrl = "https://sdk.lunarg.com/sdk/download/$vulkanVersion/windows/VulkanSDK-$vulkanVersion-Installer.exe"
          $installerPath = "$env:TEMP\VulkanSDK-Installer.exe"
          Invoke-WebRequest -Uri $vulkanUrl -OutFile $installerPath
          Start-Process -FilePath $installerPath -ArgumentList "/S" -Wait -NoNewWindow
          $vulkanPath = "C:\VulkanSDK\$vulkanVersion"
          if (Test-Path $vulkanPath) {
            "VULKAN_SDK=$vulkanPath" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
          }

      - name: Install frontend dependencies
        run: npm ci

      # ----- Build & primary upload -----

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        timeout-minutes: 45
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.platform.target }} --bundles ${{ matrix.platform.bundles }} ${{ matrix.platform.name == 'Linux' && '--features gpu-vulkan' || '' }}

      # ----- Per-platform extra artifacts -----

      - name: Create Windows portable ZIP
        if: matrix.platform.name == 'Windows'
        shell: pwsh
        run: |
          # Models are no longer bundled — the app downloads them from the
          # `models-v1` GitHub Release on first launch. The portable ZIP
          # ships only the executable; whisper-cpp .bin files used to be
          # copied here from src-tauri/models/ which is gitignored and
          # absent in CI checkouts.
          $version = "${{ needs.create-release.outputs.version }}"
          $distDir = "S2Tui-portable"
          New-Item -ItemType Directory -Force -Path "$distDir" | Out-Null
          Copy-Item "src-tauri/target/${{ matrix.platform.target }}/release/S2Tui.exe" "$distDir/"
          Compress-Archive -Path "$distDir/*" -DestinationPath "S2Tui_${version}_windows_portable.zip"

      - name: Upload Windows portable ZIP
        if: matrix.platform.name == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ needs.create-release.outputs.version }}"
          gh release upload "$version" "S2Tui_${version}_windows_portable.zip" --clobber

      - name: Create Linux portable tarball
        if: matrix.platform.name == 'Linux'
        run: |
          # Models are no longer bundled — the app downloads them on first
          # launch from the `models-v1` GitHub Release. The previous
          # `cp src-tauri/models/*.bin` step is intentionally removed: that
          # directory is gitignored and would expand to nothing in CI,
          # crashing the job.
          version="${{ needs.create-release.outputs.version }}"
          distDir="S2Tui-portable"
          mkdir -p "$distDir"
          cp src-tauri/target/${{ matrix.platform.target }}/release/S2Tui "$distDir/S2Tui"
          chmod +x "$distDir/S2Tui"
          tar -czf "S2Tui_${version}_linux_x64_portable.tar.gz" "$distDir"

      - name: Upload Linux portable tarball
        if: matrix.platform.name == 'Linux'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ needs.create-release.outputs.version }}"
          gh release upload "$version" "S2Tui_${version}_linux_x64_portable.tar.gz" --clobber

      - name: Build RPM (Linux)
        if: matrix.platform.name == 'Linux'
        run: |
          set -euo pipefail
          version="${{ needs.create-release.outputs.version }}"
          version_num="${version#v}"

          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          # Whisper .bin files are no longer bundled — the app fetches them
          # from the `models-v1` GitHub Release at first launch. The RPM
          # payload only ships the executable now; the previous
          # `/usr/share/s2tui/models/*.bin` install paths are intentionally
          # gone, both because the source files don't exist in CI and
          # because shipping a 728 MB RPM was wasteful.
          cp src-tauri/target/${{ matrix.platform.target }}/release/S2Tui ~/rpmbuild/SOURCES/S2Tui

          cat > ~/rpmbuild/SPECS/s2tui.spec <<EOF
          Name:           s2tui
          Version:        ${version_num}
          Release:        1%{?dist}
          Summary:        Local Speech-to-Text with GPU acceleration
          License:        MIT
          URL:            https://github.com/${{ github.repository }}
          BuildArch:      x86_64
          Requires:       vulkan-loader

          %description
          S2Tui is a local Speech-to-Text desktop application with Vulkan GPU
          acceleration.

          %install
          mkdir -p %{buildroot}/usr/bin
          install -m 755 %{_sourcedir}/S2Tui %{buildroot}/usr/bin/S2Tui

          %files
          /usr/bin/S2Tui
          EOF

          rpmbuild -bb ~/rpmbuild/SPECS/s2tui.spec
          cp ~/rpmbuild/RPMS/x86_64/*.rpm ./

      - name: Upload RPM
        if: matrix.platform.name == 'Linux'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ needs.create-release.outputs.version }}"
          gh release upload "$version" *.rpm --clobber

  publish-release:
    name: Publish Release
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mark release as published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ needs.create-release.outputs.version }}"
          gh release edit "$version" --draft=false
          echo "Release $version is now public."
